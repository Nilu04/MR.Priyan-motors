<main style="padding: 20px 16px;">

        <button id="addSoldEntryBtn" style="background:#10b981; border:none; color:white; padding:10px 18px; border-radius:40px; font-weight:600; font-size:13px; display:none;"><i class="fas fa-plus"></i> Add Sold</button>
    </div>
    <div id="soldGrid" class="sold-grid"></div>

<div id="loginModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Admin Access</h3><button class="modal-close" onclick="closeModal('loginModal')">&times;</button></div><div id="loginError" style="background:#fee2e2; color:#dc2626; padding:10px; border-radius:12px; margin-bottom:16px; display:none;">Invalid</div><input type="text" id="loginUsername" placeholder="Username" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><button id="doLoginBtn" style="width:100%; background:#2563eb; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Login</button><button onclick="closeModal('loginModal')" style="width:100%; margin-top:12px; background:none; border:none; padding:12px;">Cancel</button></div></div>

<div id="editSoldModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3 id="soldModalTitle">Sold Details</h3><button class="modal-close" onclick="closeModal('editSoldModal')">&times;</button></div><input type="hidden" id="editSoldId"><input type="text" id="soldName" placeholder="Bike Name *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="soldPrice" placeholder="Sold Price *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="soldMonthYear" placeholder="Month Year *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="soldBuyer" placeholder="Buyer Name *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="file" id="soldImageUpload" accept="image/*" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><img id="soldImagePreview" src="" style="width:80px; height:80px; object-fit:cover; border-radius:12px; margin-bottom:12px; display:none;"><input type="text" id="soldImageUrl" placeholder="Or paste image URL" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><div style="display:flex; gap:12px;"><button id="saveSoldBtn" style="flex:1; background:#2563eb; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Save</button><button onclick="closeModal('editSoldModal')" style="flex:1; background:#e2e8f0; border:none; border-radius:12px; font-weight:600;">Cancel</button></div></div></div>

<div id="editLogoModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Update Logo</h3><button class="modal-close" onclick="closeModal('editLogoModal')">&times;</button></div><div style="text-align:center; margin-bottom:20px;"><img id="logoPreview" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover;"></div><input type="file" id="logoUploadInput" accept="image/*" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="logoUrlInput" placeholder="Or paste image URL" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><button id="saveLogoBtn" style="width:100%; background:#8b5cf6; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Update Logo</button></div></div>

<script src="script.js"></script>
<script>
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    document.getElementById('mobileMenuToggle').addEventListener('click', function() { const menu = document.getElementById('mobileMenu'); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; });
    document.getElementById('accountBtn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('accountDropdown').classList.toggle('show'); });
    document.addEventListener('click', function() { document.getElementById('accountDropdown').classList.remove('show'); });
</script>
</body>
