<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Available Bikes | Mr. Priyan Motors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300,400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>

<!-- Navigation -->
<nav>
    <div class="nav-container">
        <div class="logo-area">
            <img id="siteLogo" src="https://placehold.co/400x400/1E3A8A/white?text=PM" alt="Logo" class="logo-img">
            <div class="logo-text">MR. PRIYAN<br><span>MOTORS</span></div>
        </div>
        <div class="right-icons">
            <a href="tel:0753503111" class="call-btn"><i class="fas fa-phone-alt"></i> Call</a>
            <div class="dropdown">
                <button class="account-btn" id="accountBtn"><i class="fas fa-user-circle"></i> <span id="userStatusText">Guest</span> <i class="fas fa-chevron-down"></i></button>
                <div class="dropdown-menu" id="accountDropdown">
                    <a href="#" id="showLoginOption" class="dropdown-item"><i class="fas fa-sign-in-alt"></i> Admin Login</a>
                    <a href="#" id="logoutBtn" class="dropdown-item text-red"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
            <button class="menu-btn" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="bikes.html" class="active"><i class="fas fa-motorcycle"></i> Bikes</a>
        <a href="sold.html"><i class="fas fa-check-circle"></i> Sold</a>
        <a href="exchange.html"><i class="fas fa-exchange-alt"></i> Sell/Exchange</a>
        <a href="contact.html"><i class="fas fa-phone-alt"></i> Contact</a>
    </div>
</nav>

<!-- Main Content -->
<main style="padding: 20px 16px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px;">
        <div>
            <h1 style="font-size: 28px; font-weight: 800;">🔥 Available Bikes</h1>
            <p style="font-size: 13px; color: #64748b;">Tap on any bike for details</p>
        </div>
        <button id="addNewBikeBtn" style="background:#10b981; border:none; color:white; padding:10px 18px; border-radius:40px; font-weight:600; font-size:13px; display:none;"><i class="fas fa-plus"></i> Add Bike</button>
    </div>
    
    <!-- Filter Chips -->
    <div class="filter-container">
        <button data-filter="all" class="filter-chip active">All Bikes</button>
        <button data-filter="price-desc" class="filter-chip">Price High-Low</button>
        <button data-filter="price-asc" class="filter-chip">Price Low-High</button>
    </div>
    
    <!-- Bikes Grid -->
    <div id="bikesGrid" class="bikes-grid"></div>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2025 Mr. Priyan Motors – Batticaloa. All Rights Reserved.</p>
</footer>

<!-- Floating WhatsApp -->
<a href="https://wa.me/94753503111" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>

<!-- Modals -->
<div id="loginModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Admin Access</h3><button class="modal-close" onclick="closeModal('loginModal')">&times;</button></div><div id="loginError" style="background:#fee2e2; color:#dc2626; padding:10px; border-radius:12px; margin-bottom:16px; display:none;">Invalid credentials</div><input type="text" id="loginUsername" placeholder="Username" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><button id="doLoginBtn" style="width:100%; background:#2563eb; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Login</button><button onclick="closeModal('loginModal')" style="width:100%; margin-top:12px; background:none; border:none; padding:12px;">Cancel</button></div></div>

<div id="editBikeModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle">Edit Bike</h3><button class="modal-close" onclick="closeModal('editBikeModal')">&times;</button></div><input type="hidden" id="editBikeId"><input type="text" id="bikeName" placeholder="Bike Name *" class="form-control" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="bikePrice" placeholder="Price (Rs.) *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="bikeYear" placeholder="Year *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="bikeKm" placeholder="Kilometers *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="bikeLocation" placeholder="Location *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="bikeBrand" placeholder="Brand *" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="file" id="bikeImageUpload" accept="image/*" style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><img id="bikeImagePreview" src="" style="width:80px; height:80px; object-fit:cover; border-radius:12px; margin-bottom:12px; display:none;"><input type="text" id="bikeImageUrl" placeholder="Or paste image URL" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><div style="display:flex; gap:12px;"><button id="saveBikeBtn" style="flex:1; background:#2563eb; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Save</button><button onclick="closeModal('editBikeModal')" style="flex:1; background:#e2e8f0; border:none; border-radius:12px; font-weight:600;">Cancel</button></div></div></div>

<div id="editLogoModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Update Logo</h3><button class="modal-close" onclick="closeModal('editLogoModal')">&times;</button></div><div style="text-align:center; margin-bottom:20px;"><img id="logoPreview" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover;"></div><input type="file" id="logoUploadInput" accept="image/*" style="width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:12px;"><input type="text" id="logoUrlInput" placeholder="Or paste image URL" style="width:100%; padding:14px; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:20px;"><button id="saveLogoBtn" style="width:100%; background:#8b5cf6; color:white; padding:14px; border:none; border-radius:12px; font-weight:600;">Update Logo</button></div></div>

<script src="script.js"></script>
<script>
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }
    
    document.getElementById('mobileMenuToggle').addEventListener('click', function() {
        const menu = document.getElementById('mobileMenu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    });
    
    document.getElementById('accountBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('accountDropdown').classList.toggle('show');
    });
    
    document.addEventListener('click', function() {
        document.getElementById('accountDropdown').classList.remove('show');
    });
</script>
</body>
</html>
